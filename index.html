<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitok Billboard</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .billboard-frame {
            max-width: 900px;
            margin: 0 auto 20px;
            background: #fff;
            border: 8px solid #222;
            padding: 10px;
            box-shadow: 10px 10px 0px #ccc;
        }
        #adDisplay { width: 100%; height: auto; display: block; }
        .crypto-address { background: #eee; padding: 10px; font-family: monospace; display: block; margin: 10px 0; font-weight: bold; }
        .contact-btn {
            display: inline-block;
            padding: 12px 20px;
            margin: 10px 5px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
        }
        .contact-btn:hover { background: #0056b3; }
        .container { background: white; padding: 30px; display: inline-block; border-radius: 8px; max-width: 600px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h1>Bitok Billboard</h1>
    
    <div class="billboard-frame">
        <img id="adDisplay" src="ads/ad1.png" alt="Billboard Ad">
    </div>

    <div class="container">
        <h3>Want to be in the rotation?</h3>
        <p>Send <b>1-5 Coins</b> to: </p>
        <code class="crypto-address">141KTCAuKksih5g68HgnYiqcMvkqKkD6vU</code>
        
        <p>Buy a billboard by private messaging me at:</p>
        
        <a href="https://bitcointalk.org/index.php?action=profile;u=3750865" target="_blank" class="contact-btn">Bitcoin Talk Profile</a>
        <a href="https://bitoktalk.xyz/index.php?action=profile;u=14" target="_blank" class="contact-btn">Bitok Talk Profile</a>
    </div>

    <script>
        // Rotating logic
        const adImages = [
            'ads/ad1.png',
            'ads/ad2.png',
            'ads/ad3.png',
            'ads/ad4.png',
            'ads/ad5.png'
        ];

        let currentIndex = 0;
        const imgElement = document.getElementById('adDisplay');

        function rotateAds() {
            currentIndex = (currentIndex + 1) % adImages.length;
            const nextImg = new Image();
            nextImg.src = adImages[currentIndex];
            nextImg.onload = () => { imgElement.src = adImages[currentIndex]; };
            nextImg.onerror = () => { rotateAds(); };
        }

        setInterval(rotateAds, 5000); // 5 second rotation
    </script>
</body>
</html>
